[build]
  command = "mkdir -p dist && cp index.html dist/ && cp logo.png dist/ && cd netlify/functions && npm init -y > /dev/null 2>&1 && npm install @supabase/supabase-js"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["@supabase/supabase-js"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/chat/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
