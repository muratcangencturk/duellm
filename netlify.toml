[build]
  command = "cp index.html dist/ && sed -i 's/MAX_RESPONSE_TOKENS=\\*\\*\\*/MAX_RESPONSE_TOKENS=350/' dist/index.html && cp logo.png dist/ 2>/dev/null; cd netlify/functions && npm init -y > /dev/null 2>&1 && npm install @supabase/supabase-js"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["@supabase/supabase-js"]

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/chat/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
