<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#1a1a1a}::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#4a4a4a}/* Firefox */ *{scrollbar-width:thin;scrollbar-color:#3a3a3a #1a1a1a}
html,body{height:100%;background:#1a1a1a;color:#e0e0e0;overflow:hidden;font-family:system-ui,-apple-system,sans-serif}
input,textarea{font-size:16px!important}
#app{display:flex;height:100dvh;width:100%}
#sidebar{width:270px;background:#1a1a1a;border-right:1px solid #2d2d2d;display:flex;flex-direction:column;flex-shrink:0;z-index:30}

@media(max-width:768px){#sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);transition:transform .2s;display:flex!important}#sidebar.open{transform:translateX(0)}#sidebar.hidden{display:flex!important}#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:20}#overlay.open{display:block}}
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:#1a1a1a}
#topbar{height:54px;border-bottom:1px solid #2d2d2d;display:flex;align-items:center;padding:0 12px;flex-shrink:0;position:relative}
#topright{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:2px}
#msgs{flex:1;overflow-y:auto;padding:20px 16px 4px}
#input-wrap{padding:12px 16px 24px}
#input-box{display:flex;align-items:flex-end;gap:8px;max-width:760px;margin:0 auto;background:#242424;border:1px solid #2d2d2d;border-radius:14px;padding:3px 10px}
#inp{flex:1;background:transparent;border:none;resize:none;font-size:16px;color:#e0e0e0;padding:8px 0;outline:none;font-family:inherit;line-height:1.4}
#sendBtn{flex-shrink:0;width:40px;height:40px;border-radius:9px;border:none;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#333;color:#777;cursor:default}
#sendBtn.on{background:#ccc;color:#111;cursor:pointer}
#sendBtn.stop{background:#c0392b;color:#fff;font-size:15px;font-weight:700}
#randBtn{flex-shrink:0;width:40px;height:40px;border-radius:9px;border:none;font-size:20px;display:flex;align-items:center;justify-content:center;background:transparent;color:#777;cursor:pointer}
#randBtn:hover{color:#e0e0e0;background:#333}
#randBtn.loading{opacity:.5;pointer-events:none}
.tip{position:relative}.tip::after{content:attr(tip);position:absolute;top:115%;left:50%;transform:translateX(-50%);background:#333;color:#aaa;font-size:10px;padding:2px 8px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:60}.tip:hover::after{opacity:1}
.hamburger{background:transparent;border:none;color:#888;cursor:pointer;font-size:20px;padding:4px 8px;margin-right:4px}
@keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg{animation:pop .2s ease-out}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cursor{animation:blink .8s infinite}
.side-logo{display:flex;align-items:center;gap:12px;padding:16px 18px 10px;border-bottom:1px solid #2d2d2d}
.side-logo img{width:48px;height:48px;border-radius:8px}

.hist-i:hover{background:#242424}
.hist-i .hdate{font-size:9px;color:#555;display:block}
.hist-del{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;display:none;line-height:1;z-index:5}
.hist-i:hover .hist-del{display:block}
.hist-del:hover{color:#e84040;background:#333}
@media(hover:none){.hist-i .hist-del.mobile-show{display:block}}
.m-row{display:flex;margin-bottom:10px}.m-row.end{justify-content:flex-end}.m-row.c{justify-content:center}
.m-user{padding:7px 14px;border-radius:10px;font-size:14px;word-break:break-word;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.18);color:#c4b5fd;max-width:85%}
.m-lab{font-size:10px;font-weight:700;margin-bottom:2px;letter-spacing:.3px}.m-lab.l{color:#4b8cf7}.m-lab.r{color:#e84040}
.bub{width:fit-content;max-width:85%;padding:8px 14px;border-radius:10px;font-size:14px;word-break:break-word;background:#242424;color:#e0e0e0;position:relative;line-height:1.5}.bub.l{border-left:3px solid #4b8cf7}.bub.r{border-right:3px solid #e84040}
.m-btn{background:transparent;border:none;font-size:12px;font-weight:600;cursor:pointer;padding:4px 6px;border-radius:6px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.m-btn.blue{color:#4b8cf7}.m-btn.red{color:#e84040}.m-btn.none{color:#666}
.g-btn{background:transparent;border:none;cursor:pointer;font-size:12px;padding:3px 4px;border-radius:4px;color:#3a3a3a}
.dd{position:absolute;top:115%;margin-top:4px;width:210px;max-height:290px;overflow-y:auto;background:#242424;border:1px solid #333;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.7);z-index:50}
.dd-i{width:100%;text-align:left;padding:8px 14px;border:none;font-size:13px;cursor:pointer;color:#aaa;background:transparent;display:block}
.dd-i:hover{background:#333}.dd-i.sel{color:#fff;font-weight:600;background:#333}
.dd-none{border-bottom:1px solid #333;font-style:italic;color:#666}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#242424;border:1px solid #333;border-radius:12px;width:92vw;max-width:420px;padding:20px}
.modal h3{font-weight:600;font-size:16px;margin-bottom:14px}
.modal label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.modal input,.modal select{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#e0e0e0;font-size:14px;margin-bottom:12px;outline:none}
.modal input:focus,.modal select:focus{border-color:#4b8cf7}
.modal .btn-primary{width:100%;padding:10px;border-radius:8px;border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;background:#4b8cf7;margin-top:4px}
.modal .btn-primary:hover{background:#3a7de6}
.modal .btn-secondary{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:transparent;color:#aaa;font-size:13px;cursor:pointer;margin-top:8px}
.modal .btn-secondary:hover{color:#e0e0e0;background:#333}
.modal .err{color:#e84040;font-size:11px;margin-bottom:8px;text-align:center}
.modal .sw{color:#888;font-size:11px;text-align:center;margin-top:10px}
.modal .sw a{color:#4b8cf7;cursor:pointer;text-decoration:underline}
.modal .sw a:hover{color:#6aa8ff}
.vs{font-size:10px;font-weight:700;color:#444}
.model-center{display:flex;align-items:center;gap:6px;flex:1;justify-content:center}
.pw{position:relative;display:flex;align-items:center;gap:3px}
.lang-btn{background:transparent;border:none;font-size:10px;font-weight:700;cursor:pointer;padding:2px 5px;border-radius:4px;color:#666;text-transform:uppercase}
.lang-btn.on{color:#e0e0e0;background:#333}
#shareBtn{background:transparent;border:none;color:#666;cursor:pointer;font-size:14px;padding:2px 3px;border-radius:4px;display:flex;align-items:center}
#shareBtn:hover{color:#e0e0e0;background:#333}
#shareBtn.done{color:#4ade80}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#e0e0e0;padding:8px 18px;border-radius:8px;font-size:13px;z-index:200;animation:pop .2s ease-out;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
@media(max-width:420px){
  #topright{position:static;transform:none;margin-left:auto;gap:1px}
  #topright .lang-btn{font-size:8px;padding:2px 4px}
  #shareBtn{font-size:12px;padding:2px 3px}
  #topbar{padding:0 6px;gap:1px}
  .model-center{gap:2px}
  .m-btn{font-size:9px;padding:2px 3px}
  .vs{font-size:8px}
}

</style>
</head><body>
<div id="app">
<div id="overlay" onclick="closeSidebar()"></div>
<div id="sidebar" class="">
  <div class="side-logo"><img src="/logo.png" onerror="this.style.display='none'"><span class="logo-t">duellm</span></div>
  <div style="padding:10px 12px"><button id="newDebBtn" onclick="newDebate()" style="width:100%;padding:9px;border-radius:8px;border:1px solid #333;background:transparent;color:#d1d5db;font-size:14px;font-weight:500;cursor:pointer">+ New Chat</button></div>
  <div style="flex:1;overflow-y:auto;padding:4px" id="histCont"><div class="sec-t">History</div><div id="histEmp" style="padding:8px 16px;font-size:12px;color:#666;font-style:italic">No history yet</div></div>
  <div style="padding:8px 12px 0"><button id="upgradeBtn" onclick="upgradePlan()" style="width:100%;text-align:left;padding:8px 14px;border-radius:8px;border:1px solid #3d3520;background:linear-gradient(135deg,#2a2416,#1f1a0e);color:#e2b24f;font-size:13px;cursor:pointer">⭐ Upgrade Plan</button></div>
  <div style="padding:10px 12px;border-top:1px solid #2d2d2d"><button id="loginBtn" onclick="handleAuthClick()" style="width:100%;text-align:left;padding:10px 14px;border-radius:8px;border:none;background:transparent;color:#999;font-size:13px;cursor:pointer"> Sign Up / Login</button></div>
</div>
<div id="main">
  <div id="topbar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="model-center">
      <div class="pw" id="pwL">
        <button class="m-btn blue tip" tip="Change Model" id="btnL" onclick="toggleDropdown(event,'L')">Cogito 2.1 671b ▼</button>
        <button class="g-btn tip" tip="Settings" id="gearL" onclick="openSettings('L')" style="display: inline-flex;">⚙</button>
      </div>
      <span class="vs" id="vsSpan">VS</span>
      <div class="pw" id="pwR">
        <button class="g-btn tip" tip="Settings" id="gearR" onclick="openSettings('R')" style="display: inline-flex;">⚙</button>
        <button class="m-btn red tip" tip="Change Model" id="btnR" onclick="toggleDropdown(event,'R')">▼ Gemma3 27b</button>
      </div>
    </div>
    <div id="topright">
      <button id="shareBtn" class="tip" tip="Share" onclick="shareChat()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg></button>
      <button class="lang-btn on" id="lEN" onclick="setLang('en')">EN</button><button class="lang-btn" id="lTR" onclick="setLang('tr')">TR</button>
    </div>
  </div>
  
  <div id="msgs"></div>
  <div id="input-wrap"><div id="input-box">
    <button id="randBtn" class="tip" tip="Random topic" onclick="randomTopic()">?</button>
    <textarea id="inp" rows="1" placeholder="Send a message" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendOrStop()}"></textarea>
    <button id="sendBtn" onclick="sendOrStop()" class="">↑</button>
  </div><div id="limit-msg" style="display:none;text-align:center;padding-top:8px;font-size:12px;color:#ef4444;white-space:pre-wrap"></div></div>
</div>
</div>
<div id="toast" class="toast"></div>

<script>
// ── MODELS ──
var MODELS=["cogito-2.1:671b","gemma3:12b","gemma3:27b","qwen3-vl:235b-instruct"];

// ── LIMITS ──
var LIMIT_GUEST=10000, LIMIT_USER=30000, LIMIT_PREMIUM=300000;
var MAX_CHAT_TOKENS=10000;
var MAX_RESPONSE_TOKENS=512;

var RP_EN="Generate one single-sentence debate discussion topic or question. It can be about technology, philosophy, society, science, ethics, politics, or any thought-provoking subject. Just the sentence, nothing else.";
var RP_TR="Tek cümlelik bir tartışma konusu veya soru üret. Teknoloji, felsefe, toplum, bilim, etik, politika veya düşündürücü herhangi bir konu olabilir. Sadece cümle, başka bir şey yazma.";

// ── TRANSLATIONS ──
var L='en';
var TX={
  en:{newDebate:'+ New Chat',history:'History',noHistory:'No history yet',loginIn:' Sign Up / Login',loginOut:' Sign Out',upgrade:'⭐ Upgrade Plan',upgradeWarn:'Please sign up / login first.',sendMsg:'Send a message',change:'Change Model',settings:'Settings',rand:'Random topic',none:'— None —',limitGuest:'Daily limit reached.\nSign up for more usage.',limitUser:'Daily limit reached.\nPlease upgrade plan for x10 more tokens.',limitPremium:'Daily limit reached.\nUpgrade for even more tokens.',limitChat:'Chat limit reached (10K tokens).\nSend a message to continue.',rp:RP_EN,vs:'VS',blue:'Blue',red:'Red',mdl:'Model',sp:'System Prompt',spPlace:'Instructions for this model...',save:'Save',share:'Share',shared:'Link copied! Share this link to show this conversation.',shareTooltip:'Share',signupTitle:'Create Account',loginTitle:'Sign In',email:'Email',password:'Password',username:'Username',signupBtn:'Create Account',loginBtn:'Sign In',switchSignup:'Already have an account? Sign in',switchLogin:"Don't have an account? Sign up",logout:'Sign Out',licenseTitle:'Activate Premium',licenseKey:'Order ID',licenseBtn:'Activate',licenseDesc:'Enter your Gumroad Order ID:',licenseLink:'Buy on Gumroad →',licenseSuccess:'Premium activated! You now have 300K tokens/day.',licenseFail:'Invalid Order ID. Please try again.',activated:'Premium ✓'},
  tr:{newDebate:'+ Yeni Sohbet',history:'Geçmiş',noHistory:'Henüz geçmiş yok',loginIn:' Kayıt Ol / Giriş Yap',loginOut:' Çıkış Yap',upgrade:'⭐ Planı Yükselt',upgradeWarn:'Lütfen önce kayıt olun / giriş yapın.',sendMsg:'Mesaj gönder',change:'Model Değiştir',settings:'Ayarlar',rand:'Rastgele konu',none:'— Boş —',limitGuest:'Günlük limit doldu.\nDaha fazla kullanım için kayıt olun.',limitUser:'Günlük limit doldu.\nx10 daha fazla token için planı yükseltin.',limitPremium:'Günlük limit doldu.\nDaha fazlası için yükseltin.',limitChat:'Sohbet limiti doldu (10K token).\nDevam etmek için mesaj gönder.',rp:RP_TR,vs:'VS',blue:'Mavi',red:'Kırmızı',mdl:'Model',sp:'Sistem Promptu',spPlace:'Bu model için talimatlar...',save:'Kaydet',share:'Paylaş',shared:'Link kopyalandı! Bu linkle sohbeti paylaşabilirsin.',shareTooltip:'Paylaş',signupTitle:'Hesap Oluştur',loginTitle:'Giriş Yap',email:'E-posta',password:'Şifre',username:'Kullanıcı Adı',signupBtn:'Hesap Oluştur',loginBtn:'Giriş Yap',switchSignup:'Zaten hesabın var mı? Giriş yap',switchLogin:'Hesabın yok mu? Kayıt ol',logout:'Çıkış Yap',licenseTitle:'Premium Aktifleştir',licenseKey:'Sipariş No',licenseBtn:'Aktifleştir',licenseDesc:'Gumroad Sipariş Numaranı gir:',licenseLink:'Gumroad\'dan Satın Al →',licenseSuccess:'Premium aktif! Artık günlük 300K token kullanabilirsin.',licenseFail:'Geçersiz Sipariş No. Tekrar dene.',activated:'Premium ✓'}
};
function t(k){return TX[L][k]||k}

// ── AUTH STATE ──
var AU=null;
(function(){
  var s=localStorage.getItem('duellm_session');
  if(s){try{AU=JSON.parse(s)}catch(e){}}
})();
function saveAuth(){
  if(AU)localStorage.setItem('duellm_session',JSON.stringify(AU));
  else{
    localStorage.removeItem('duellm_session');
    // On logout: restore localStorage-only history
    H=JSON.parse(localStorage.getItem('duellm_hist_local')||'[]');
    renderHistory();
  }
}
function isAuth(){return !!AU}
function userTier(){return AU?AU.tier:'guest'}
function userDailyLimit(){var t=userTier();return t==='premium'?LIMIT_PREMIUM:t==='user'?LIMIT_USER:LIMIT_GUEST}

// ── SUPABASE HISTORY SYNC ──
function syncHistoryToCloud(entry){
  if(!isAuth())return;
  fetch('/api/history',{
    method:'POST',headers:{'Content-Type':'application/json','x-duellm-uid':AU.user_id},
    body:JSON.stringify(entry)
  }).catch(function(){});
}
function syncDeleteFromCloud(id){
  if(!isAuth())return;
  fetch('/api/history/'+encodeURIComponent(id),{
    method:'DELETE',headers:{'x-duellm-uid':AU.user_id}
  }).catch(function(){});
}
async function loadHistoryFromCloud(){
  if(!isAuth())return;
  try{
    var r=await fetch('/api/history',{headers:{'x-duellm-uid':AU.user_id}});
    var cloud=await r.json();
    if(!Array.isArray(cloud)||!cloud.length)return;
    // Convert cloud entries to local format
    H=cloud.map(function(e){
      return {id:e.id,topic:e.topic,modelL:e.modelL,modelR:e.modelR,sysL:e.sysL||'',sysR:e.sysR||'',msgs:e.msgs||[],ts:new Date(e.created_at).getTime()};
    }).sort(function(a,b){return b.ts-a.ts;});
    if(H.length>30)H=H.slice(0,30);
    // Mirror to localStorage as backup
    localStorage.setItem('duellm_hist_local',JSON.stringify(H));
    renderHistory();
  }catch(e){}
}

// ── LANG ──
function setLang(l){
  L=l;localStorage.setItem('dlang',l);
  document.getElementById('lEN').className='lang-btn'+(l==='en'?' on':'');
  document.getElementById('lTR').className='lang-btn'+(l==='tr'?' on':'');
  applyLang();
}
function applyLang(){
  document.getElementById('newDebBtn').textContent=t('newDebate');
  document.getElementById('upgradeBtn').textContent=t('upgrade');
  document.getElementById('inp').placeholder=t('sendMsg');
  document.getElementById('randBtn').setAttribute('tip',t('rand'));
  document.getElementById('shareBtn').setAttribute('tip',t('shareTooltip'));
  var bL=document.getElementById('btnL'),bR=document.getElementById('btnR');
  bL.setAttribute('tip',t('change'));bR.setAttribute('tip',t('change'));
  document.getElementById('gearL').setAttribute('tip',t('settings'));
  document.getElementById('gearR').setAttribute('tip',t('settings'));
  document.getElementById('vsSpan').textContent='VS';
  updateLoginBtn();
  renderHistory();
  updateLimitMsg();
}
(function(){
  var sl=localStorage.getItem('dlang')||'en';L=sl;
  document.getElementById('lEN').className='lang-btn'+(sl==='en'?' on':'');
  document.getElementById('lTR').className='lang-btn'+(sl==='tr'?' on':'');
})();

// ── LOGIN UI ──
function updateLoginBtn(){
  var b=document.getElementById('loginBtn');
  if(isAuth()&&AU.tier==='premium'){b.textContent='🚪 '+AU.username+' — Premium ✓';return}
  b.textContent=isAuth()?('🚪 '+AU.username+' — '+t('logout')):t('loginIn');
}
function handleAuthClick(){
  if(isAuth()){AU=null;saveAuth();updateLoginBtn();updateLimitMsg();showToast(t('logout'));return}
  showAuthModal('signup');
}
function showAuthModal(mode){
  var existing=document.querySelector('.modal-overlay');if(existing)existing.remove();
  var ov=document.createElement('div');ov.className='modal-overlay';
  ov.onclick=function(e){if(e.target===ov)ov.remove()};
  var isLogin=mode==='login';
  ov.innerHTML='<div class="modal">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3>'+t(isLogin?'loginTitle':'signupTitle')+'</h3><button style="background:none;border:none;color:#777;font-size:22px;cursor:pointer" onclick="this.closest(\'.modal-overlay\').remove()">×</button></div>'+
    '<div class="err" id="authErr" style="display:none"></div>'+
    (!isLogin?'<label>'+t('username')+'</label><input id="authUser" placeholder="'+t('username')+'">':'')+
    '<label>'+t('email')+'</label><input id="authEmail" type="email" placeholder="'+t('email')+'">'+
    '<label>'+t('password')+'</label><input id="authPass" type="password" placeholder="'+t('password')+'" onkeydown="if(event.key===\'Enter\')document.getElementById(\'authSubmit\').click()">'+
    '<button class="btn-primary" id="authSubmit">'+t(isLogin?'loginBtn':'signupBtn')+'</button>'+
    '<div class="sw">'+t(isLogin?'switchLogin':'switchSignup').replace('Sign in','<a id="authSwitch">Sign in</a>').replace('Sign up','<a id="authSwitch">Sign up</a>').replace('sign in','<a id="authSwitch">sign in</a>').replace('sign up','<a id="authSwitch">sign up</a>').replace('Giriş yap','<a id="authSwitch">Giriş yap</a>').replace('Kayıt ol','<a id="authSwitch">Kayıt ol</a>').replace('giriş yap','<a id="authSwitch">giriş yap</a>').replace('kayıt ol','<a id="authSwitch">kayıt ol</a>')+'</div>'+
  '</div>';
  document.body.appendChild(ov);
  document.getElementById('authSwitch').onclick=function(){showAuthModal(isLogin?'signup':'login')};
  document.getElementById('authSubmit').onclick=function(){
    var email=document.getElementById('authEmail').value.trim();
    var password=document.getElementById('authPass').value.trim();
    var username=isLogin?'':document.getElementById('authUser').value.trim();
    var errEl=document.getElementById('authErr');
    if(!email||!password){errEl.textContent='Please fill all fields.';errEl.style.display='block';return}
    if(!isLogin&&!username){errEl.textContent='Please fill all fields.';errEl.style.display='block';return}
    errEl.style.display='none';
    var btn=document.getElementById('authSubmit');btn.textContent='...';btn.disabled=true;
    fetch('/api/chat/'+(isLogin?'login':'signup'),{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email,password:password,username:username})
    }).then(function(r){return r.json()}).then(function(d){
      if(d.error){errEl.textContent=d.error;errEl.style.display='block';btn.textContent=t(isLogin?'loginBtn':'signupBtn');btn.disabled=false;return}
      if(isLogin){AU={user_id:d.user_id,username:d.username,email:d.email,tier:d.tier||'user'};}

function typewrite(id,full,cb){

    i+=chunk;if(i>full.length)i=full.length;
    updateBub(id,full.slice(0,i),true);E.timer=setTimeout(step,spd);
  }
  updateBub(id,full.slice(0,1),true);E.timer=setTimeout(step,spd);
}

// ── CHAT MODE ──
async function speakOnce(side){
  if(!E.running||E.speaking||E.chatPaused||totalUsedToday()>=userDailyLimit()){E.speaking=false;E.running=false;updateBtn();updateLimitMsg();return}
  E.speaking=true;updateBtn();
  var mn=GM(side);if(!mn){E.speaking=false;updateBtn();return}
  var msgId=addMsgEl(side,'...',mn);
  var ctrl=new AbortController();E.abort=function(){ctrl.abort();};
  var sys=GS(side);
  var sp='Reply in the same language as the user.\n\nUser: "'+S.topic+'"\n\nSpeak like a sharp, articulate human — not an academic paper. No word salads, no empty fluff. ChatGPT/Claude quality: natural, direct, conversational. Structure for readability — use dashes for lists, break paragraphs, add emojis where they feel natural. No asterisk bullets (*). Absolutely no roleplay — no stage directions in parentheses, no self-introductions. Do NOT introduce yourself or mention which model you are. Only say who you are if someone explicitly addressed you.'+(sys?'\n\nContext: '+sys:'');
  try{
    var r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json','x-duellm-uid':isAuth()?AU.user_id:'','x-duellm-tier':userTier()},body:JSON.stringify({model:mn,messages:[{role:'system',content:sp},{role:'user',content:S.topic}],options:{num_predict:MAX_RESPONSE_TOKENS,temperature:.85,top_p:.9}}),signal:ctrl.signal});
    var d=await r.json();
    if(d.error==='daily_limit'){updateBub(msgId,t('limitUser'),false);E.speaking=false;E.abort=null;E.running=false;updateBtn();updateLimitMsg();return}
    var txt=(d.message?.content||'').trim();
    if(!txt||txt.length<4){E.speaking=false;E.abort=null;E.running=false;updateBtn();return}
    E.abort=null;
    var respTok=estTok(txt)+estTok(sp)+estTok(S.topic);
    trackLocal(respTok);
    if(E.chatPaused||totalUsedToday()>=userDailyLimit()){updateBub(msgId,txt.slice(0,300)+'...',false);E.speaking=false;E.running=false;updateBtn();updateLimitMsg();return}
    typewrite(msgId,txt,function(){E.speaking=false;E.running=false;updateBtn();saveHistory();});
  }catch(e){if(e.name!=='AbortError')updateBub(msgId,'...',false);E.speaking=false;E.abort=null;E.running=false;updateBtn();}
}

// ── DEBATE MODE ──
async function speakDebate(side){
  if(!E.running||E.speaking||E.chatPaused||!GM(side)||totalUsedToday()>=userDailyLimit()){E.speaking=false;updateBtn();updateLimitMsg();return}
  E.speaking=true;updateBtn();
  var mn=GM(side),op=GO(side);
  var msgId=addMsgEl(side,'...',mn);
  var ctrl=new AbortController();E.abort=function(){ctrl.abort();};
  var sp='Debate in the same language as the topic.\n\nTopic: "'+S.topic+'"\n\nYou are in an AI vs AI debate arena. Your opponent just spoke — read their argument and push back. Find gaps, challenge weak logic, bring counterpoints, develop the thought further. If they are wrong, refute. If they have a point but missed something, build on it. Agreeing is your last option — only when there is genuinely nothing to contest.\n\nSpeak like a sharp, quick-witted debater — not an academic paper. No fluff, no filler, no word salads. Be direct, punchy, human.\n\nFormat clearly: use dashes for lists, break text into readable chunks, add emojis for emphasis. No asterisk bullets (*). Absolutely no roleplay — no stage directions, no self-introductions. Do NOT address Kirmizi or Mavi in every reply - only when directly countering a point they made. Just argue plainly.'+(GS(side)?'\n\nStyle: '+GS(side):'');
  var am=[{role:'system',content:sp}];
  var rows=document.getElementById('msgs').children;
  var ctxLen=0,ctxMax=10000;
  for(var i=rows.length-1;i>=0;i--){
    var r=rows[i];if(!r.classList.contains('m-row')||r.querySelector('.cursor'))continue;
    var entry;
    if(r.classList.contains('c')){
      entry={role:'user',content:'User message: '+r.querySelector('.m-user').textContent};
    }else{
      var isEnd=r.classList.contains('end');var mSide=isEnd?'R':'L';
      var mName=r.querySelector('.m-lab')?r.querySelector('.m-lab').textContent:'';
      var mTxt=r.querySelector('.bub')?r.querySelector('.bub').textContent:'';
      entry={role:mSide===side?'assistant':'user',content:mSide!==side?'Other participant: '+mTxt:mTxt};
    }
    ctxLen+=entry.content.length+10;
    if(ctxLen>ctxMax)break;
    am.splice(1,0,entry);
  }
  try{
    var rr=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json','x-duellm-uid':isAuth()?AU.user_id:'','x-duellm-tier':userTier()},body:JSON.stringify({model:mn,messages:am,options:{num_predict:MAX_RESPONSE_TOKENS,temperature:.85,top_p:.9}}),signal:ctrl.signal});
    var dd=await rr.json();
    if(dd.error==='daily_limit'){updateBub(msgId,t('limitUser'),false);E.speaking=false;E.abort=null;E.running=false;updateBtn();updateLimitMsg();return}
    var txt=(dd.message?.content||'').trim();
    if(!txt||txt.length<4){E.speaking=false;E.abort=null;E.running=false;updateBtn();return}
    E.abort=null;
    var respTok=estTok(txt)+estTok(JSON.stringify(am));
    trackLocal(respTok);
    if(E.chatPaused||totalUsedToday()>=userDailyLimit()){updateBub(msgId,txt.slice(0,300)+'...',false);E.speaking=false;E.running=false;updateBtn();updateLimitMsg();return}
    typewrite(msgId,txt,function(){
      E.speaking=false;updateBtn();saveHistory();
      if(E.running&&!E.chatPaused){E.timer=setTimeout(function(){speakDebate(side==='L'?'R':'L');},4000);}
    });
  }catch(e){if(e.name!=='AbortError')updateBub(msgId,'...',false);E.speaking=false;E.abort=null;updateBtn();if(E.running&&!E.chatPaused){E.timer=setTimeout(function(){speakDebate(side==='L'?'R':'L');},4000);}}
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function upgradePlan(){
  if(isAuth()){showLicenseModal();}
  else{showAuthModal('signup');}
}
function showLicenseModal(){
  var existing=document.querySelector('.modal-overlay');if(existing)existing.remove();
  var ov=document.createElement('div');ov.className='modal-overlay';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  ov.innerHTML='<div class="modal">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3>'+t('licenseTitle')+'</h3><button style="background:none;border:none;color:#777;font-size:22px;cursor:pointer" onclick="this.closest(\'.modal-overlay\').remove()">×</button></div>'+
    '<div class="err" id="licErr" style="display:none"></div>'+
    '<p style="font-size:12px;color:#888;margin-bottom:10px">'+t('licenseDesc')+' <a href="https://ailegion.gumroad.com/l/duellm" target="_blank" style="color:#4b8cf7">'+t('licenseLink')+'</a></p>'+
    '<label>'+t('licenseKey')+'</label><input id="licKey" placeholder="ör: 1234567890" onkeydown="if(event.key===\'Enter\')document.getElementById(\'licSubmit\').click()">'+
    '<button class="btn-primary" id="licSubmit">'+t('licenseBtn')+'</button>'+
  '</div>';
  document.body.appendChild(ov);
  document.getElementById('licSubmit').onclick=function(){
    var key=document.getElementById('licKey').value.trim();
    var err=document.getElementById('licErr');
    if(!key){err.textContent='Please enter your Order ID.';err.style.display='block';return}
    err.style.display='none';
    var btn=document.getElementById('licSubmit');btn.textContent='...';btn.disabled=true;
    fetch('/api/chat/verify',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:AU.user_id,order_id:key})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.error){err.textContent=t('licenseFail');err.style.display='block';btn.textContent=t('licenseBtn');btn.disabled=false;return}
      AU.tier='premium';saveAuth();updateLoginBtn();updateLimitMsg();ov.remove();
      showToast(t('licenseSuccess'));
    }).catch(function(){
      err.textContent='Connection error.';err.style.display='block';
      btn.textContent=t('licenseBtn');btn.disabled=false;
    });
  };
}
